name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      # The repository targets 100% coverage. The strict gate below is enabled
      # once the first tested package lands; until then it only reports totals.
      - name: Coverage
        run: |
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -n 1
          else
            echo "No coverage profile yet (no packages)."
          fi
